name: mobile_app
description: DG Smart School Management System Mobile Application (Teacher & Parent Portal)
version: 1.0.0+1
environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  dio: ^5.3.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  fluro: ^2.0.0
  flutter_svg: ^2.0.0
  shimmer: ^3.0.0
  intl: ^0.18.0
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.0
  font_awesome_flutter: ^10.6.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
